name: MahjongAssistant
options:
  bundleIdPrefix: com.tingpai
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  MahjongAssistant:
    type: application
    platform: iOS
    sources:
      - path: MahjongAssistant
        excludes:
          - Resources
      - path: MahjongAssistant/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tingpai.mahjongassistant
        PRODUCT_NAME: MahjongAssistant
        INFOPLIST_FILE: MahjongAssistant/Supporting/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: MahjongAssistant/Supporting/BridgingHeader.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "3"
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets:
        - MahjongAssistantTests
  MahjongAssistantTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MahjongAssistantTests
    dependencies:
      - target: MahjongAssistant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tingpai.mahjongassistant.tests
        GENERATE_INFOPLIST_FILE: YES
