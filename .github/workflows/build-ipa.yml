name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Install ONNX Runtime
        run: pod install --repo-update

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_ID="$(
            xcrun simctl list devices available --json |
            python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for runtime in d.values() for x in runtime if x["name"].startswith("iPhone")))'
          )"
          xcodebuild \
            -workspace MahjongAssistant.xcworkspace \
            -scheme MahjongAssistant \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            test

      - name: Build unsigned IPA
        run: bash scripts/build-unsigned-ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MahjongAssistant-unsigned-ipa
          path: build/MahjongAssistant-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
